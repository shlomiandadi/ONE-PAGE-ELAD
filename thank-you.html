<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="תודה על פנייתכם לאריאל שער">
    <title>תודה על פנייתך | אריאל שער</title>
    <link rel="shortcut icon" href="assets/img/favicon.png">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #e8eeff 0%, #f6f8fc 55%, #f8fafc 100%);
            color: #1a2340;
        }
        .thank-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .thank-card {
            max-width: 760px;
            width: 100%;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 22px 45px rgba(25, 46, 102, 0.1);
            padding: 42px 28px;
            text-align: center;
        }
        .thank-icon {
            width: 78px;
            height: 78px;
            margin: 0 auto 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1f45ff 0%, #5b7bff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 34px;
            font-weight: 700;
        }
        .thank-title {
            margin-bottom: 10px;
            font-size: clamp(1.7rem, 3vw, 2.2rem);
            color: #1f45ff;
        }
        .thank-text {
            max-width: 540px;
            margin: 0 auto 22px;
            line-height: 1.8;
        }
        .back-btn {
            display: inline-block;
            background: #1f45ff;
            color: #fff;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
        }
        .back-btn:hover {
            color: #fff;
            opacity: 0.95;
        }
    </style>
</head>
<body class="bg-light">
    <main class="container thank-page">
        <div class="thank-card">
            <div class="thank-icon">✓</div>
            <h1 class="thank-title">תודה, הפנייה התקבלה בהצלחה</h1>
            <p class="thank-text">
                תודה שהשארתם פרטים באתר <strong>shaer-finance.co.il</strong>.
                נחזור אליכם בהקדם לתיאום שיחת ייעוץ אישית.
            </p>
            <a href="index.html#contact" class="back-btn">חזרה לאתר</a>
        </div>
    </main>
</body>
</html>
